server:
  port: 8080
  servlet:
    context-path: /v1

spring:
  application:
    name: endcareerai-platform

  # MySQL 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/ai_recruit_platform?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai  # TODO: 请修改为你的 MySQL 数据库地址和数据库名
    username: root      # TODO: 请修改为你的 MySQL 用户名
    password: root      # TODO: 请修改为你的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 缓存配置
  data:
    redis:
      host: localhost   # TODO: 请修改为你的 Redis 服务器地址
      port: 6379        # TODO: 请修改为你的 Redis 端口
      password:         # TODO: 如果 Redis 设置了密码，请在此填写
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

    # Elasticsearch 搜索引擎配置
    elasticsearch:
      uris: http://localhost:9200  # TODO: 请修改为你的 Elasticsearch 地址

  # RabbitMQ 消息队列配置
  rabbitmq:
    host: localhost     # TODO: 请修改为你的 RabbitMQ 服务器地址
    port: 5672          # TODO: 请修改为你的 RabbitMQ 端口
    username: guest     # TODO: 请修改为你的 RabbitMQ 用户名
    password: guest     # TODO: 请修改为你的 RabbitMQ 密码
    virtual-host: /
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        acknowledge-mode: manual

  # Jackson JSON 序列化配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-handlers-package: com.endcareerai.platform.config

# JWT 认证配置
jwt:
  secret: EndCareerAi2026SecretKeyForJwtTokenGenerationMustBeLongEnough256Bits!!  # TODO: 请修改为你的 JWT 密钥（至少256位），建议通过环境变量注入
  expiration: 86400000  # Token 过期时间（毫秒），当前为24小时

# LLM 大语言模型配置（OpenAI 兼容接口，支持 OpenAI / DeepSeek / 通义千问等）
llm:
  base-url: https://api.openai.com          # TODO: 请修改为你的 LLM API 基础地址（如 DeepSeek: https://api.deepseek.com）
  api-key: ${LLM_API_KEY:sk-your-api-key}   # TODO: 请通过环境变量 LLM_API_KEY 注入你的 API 密钥
  model: gpt-3.5-turbo                       # TODO: 请修改为你要使用的模型名称（如 deepseek-chat）
  temperature: 0.3                           # 生成温度，越低越确定性
  max-tokens: 2000                           # 最大生成 token 数
  connect-timeout: 10                        # 连接超时（秒）
  read-timeout: 60                           # 读取超时（秒）

# 日志配置
logging:
  level:
    com.endcareerai.platform: debug
    org.springframework.amqp: info
